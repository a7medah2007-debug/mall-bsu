<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="xr-spatial-tracking" content="true">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <title>Supermarket VR — متجر الواقع الافتراضي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- إضافة الـ CSS الخارجي -->
  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --c-bg:        #080c10;
      --c-surface:   rgba(10, 18, 28, 0.92);
      --c-border:    rgba(255, 210, 0, 0.25);
      --c-gold:      #FFD700;
      --c-gold-dim:  rgba(255, 215, 0, 0.7);
      --c-cyan:      #00e5ff;
      --c-red:       #ff4444;
      --c-green:     #00e676;
      --c-text:      #e8eaf0;
      --c-muted:     rgba(200, 210, 230, 0.55);
      --blur:        blur(14px);
      --radius-sm:   8px;
      --radius-md:   14px;
      --radius-lg:   20px;
      --font-ar:     'Cairo', sans-serif;
      --font-hud:    'Rajdhani', sans-serif;
      --shadow-gold: 0 0 20px rgba(255, 215, 0, 0.2);
      --shadow-glow: 0 0 30px rgba(0, 229, 255, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--c-bg);
      font-family: var(--font-ar);
      color: var(--c-text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
      touch-action: none;
      outline: none;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--c-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.6s ease;
    }

    .loading-logo {
      font-family: var(--font-hud);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--c-gold);
      text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
      animation: pulse-logo 2s ease-in-out infinite;
    }

    .loading-sub {
      font-family: var(--font-ar);
      font-size: clamp(13px, 2.5vw, 17px);
      color: var(--c-muted);
      letter-spacing: 1px;
      direction: rtl;
    }

    .loading-bar-wrap {
      width: min(340px, 80vw);
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-gold), var(--c-cyan));
      border-radius: 99px;
      animation: load-progress 3s ease-out forwards;
      box-shadow: 0 0 12px rgba(255,215,0,0.6);
    }

    .loading-ring {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,215,0,0.12);
      border-top-color: var(--c-gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin         { to { transform: rotate(360deg); } }
    @keyframes load-progress { to { width: 100%; } }
    @keyframes pulse-logo {
      0%, 100% { text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2); }
      50%       { text-shadow: 0 0 60px rgba(255,215,0,0.8), 0 0 120px rgba(255,215,0,0.4); }
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="loading-screen">
    <div class="loading-ring"></div>
    <div class="loading-logo">SUPERMARKET VR</div>
    <div class="loading-sub">⏳ جاري تحميل بيئة المتجر...</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- صوت الخلفية -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/sounds/background.mp3" type="audio/mpeg">
  </audio>

  <!-- الكانفس الرئيسي -->
  <canvas id="game-canvas" tabindex="0"></canvas>

  <!-- غلاف زر الـ VR (تضعه Babylon تلقائياً) -->
  <div id="vr-btn-wrapper"></div>

  <!-- سكريبتات Babylon -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

  <!-- ملفات المشروع -->
  <script src="confi.js"></script>
  <script src="mai.js"></script>
  <script src="movemet.js"></script>
  <script src="interactios.js"></script>

</body>
</html>
