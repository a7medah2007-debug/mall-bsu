<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="xr-spatial-tracking" content="true">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <title>Supermarket VR — متجر الواقع الافتراضي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --c-bg:        #080c10;
      --c-surface:   rgba(10, 18, 28, 0.92);
      --c-border:    rgba(255, 210, 0, 0.25);
      --c-gold:      #FFD700;
      --c-gold-dim:  rgba(255, 215, 0, 0.7);
      --c-cyan:      #00e5ff;
      --c-red:       #ff4444;
      --c-green:     #00e676;
      --c-text:      #e8eaf0;
      --c-muted:     rgba(200, 210, 230, 0.55);
      --blur:        blur(14px);
      --radius-sm:   8px;
      --radius-md:   14px;
      --radius-lg:   20px;
      --font-ar:     'Cairo', sans-serif;
      --font-hud:    'Rajdhani', sans-serif;
      --shadow-gold: 0 0 20px rgba(255, 215, 0, 0.2);
      --shadow-glow: 0 0 30px rgba(0, 229, 255, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--c-bg);
      font-family: var(--font-ar);
      color: var(--c-text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
      touch-action: none;
      outline: none;
    }

    /* شاشة التحميل */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--c-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.6s ease;
    }

    .loading-logo {
      font-family: var(--font-hud);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--c-gold);
      text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
      animation: pulse-logo 2s ease-in-out infinite;
    }

    .loading-sub {
      font-family: var(--font-ar);
      font-size: clamp(13px, 2.5vw, 17px);
      color: var(--c-muted);
      letter-spacing: 1px;
      direction: rtl;
    }

    .loading-bar-wrap {
      width: min(340px, 80vw);
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-gold), var(--c-cyan));
      border-radius: 99px;
      animation: load-progress 3s ease-out forwards;
      box-shadow: 0 0 12px rgba(255,215,0,0.6);
    }

    .loading-ring {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,215,0,0.12);
      border-top-color: var(--c-gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin         { to { transform: rotate(360deg); } }
    @keyframes load-progress { to { width: 100%; } }
    @keyframes pulse-logo {
      0%, 100% { text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2); }
      50%       { text-shadow: 0 0 60px rgba(255,215,0,0.8), 0 0 120px rgba(255,215,0,0.4); }
    }

    /* ========== إشعار Meta Quest 2 الرسمي (محاكاة دقيقة) ========== */
    #quest-notification-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #quest-notification-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .quest-notification-box {
      background: rgba(30, 30, 40, 0.92);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      max-width: 380px;
      width: 90%;
      animation: questSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes questSlideUp {
      from {
        transform: translateY(20px) scale(0.95);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    /* الأيقونة الحمراء المميزة */
    .quest-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 59, 48, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1.5px solid rgba(255, 59, 48, 0.5);
    }

    .quest-icon-inner {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ff3b30;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 59, 48, 0.7);
    }

    .quest-icon-exclaim {
      color: white;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      font-family: 'Rajdhani', sans-serif;
    }

    .quest-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .quest-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .quest-message {
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(220, 220, 240, 0.85);
      line-height: 1.4;
    }

    .quest-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .quest-progress-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #ff6b6b;
      letter-spacing: 0.3px;
    }

    .quest-progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
      overflow: hidden;
    }

    .quest-progress-fill {
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, #ff9f43, #ff3b30);
      border-radius: 99px;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
    }

    .quest-dismiss {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-family: inherit;
    }

    .quest-dismiss:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    @media (max-width: 500px) {
      .quest-notification-box {
        padding: 12px 16px;
        gap: 10px;
      }
      .quest-icon-wrap {
        width: 36px;
        height: 36px;
      }
      .quest-icon-inner {
        width: 20px;
        height: 20px;
      }
      .quest-icon-exclaim {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="loading-screen">
    <div class="loading-ring"></div>
    <div class="loading-logo">SUPERMARKET VR</div>
    <div class="loading-sub">⏳ جاري تحميل بيئة المتجر...</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- صوت الخلفية -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/sounds/background.mp3" type="audio/mpeg">
  </audio>

  <!-- الكانفس الرئيسي -->
  <canvas id="game-canvas" tabindex="0"></canvas>

  <!-- غلاف زر الـ VR (تضعه Babylon تلقائياً) -->
  <div id="vr-btn-wrapper"></div>

  <!-- ✅ إشعار Meta Quest 2 الرسمي (وهمي) -->
  <div id="quest-notification-overlay">
    <div class="quest-notification-box">
      <div class="quest-icon-wrap">
        <div class="quest-icon-inner">
          <span class="quest-icon-exclaim">!</span>
        </div>
      </div>
      <div class="quest-content">
        <div class="quest-title">ذاكرة النظام منخفضة</div>
        <div class="quest-message">أغلق بعض التطبيقات لتحسين الأداء</div>
        <div class="quest-progress">
          <span class="quest-progress-text">80%</span>
          <div class="quest-progress-bar">
            <div class="quest-progress-fill"></div>
          </div>
        </div>
      </div>
      <button class="quest-dismiss" id="quest-dismiss-btn" aria-label="تجاهل">✕</button>
    </div>
  </div>

  <!-- سكريبتات Babylon -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

  <!-- ملفات المشروع الخارجية -->
  <script src="confi.js"></script>
  <script src="mai.js"></script>
  <script src="movemet.js"></script>
  <script src="interactios.js"></script>

  <!-- ⚙️ سكريبت الإشعار الوهمي -->
  <script>
    (function() {
      const overlay = document.getElementById('quest-notification-overlay');
      const dismissBtn = document.getElementById('quest-dismiss-btn');

      function hideNotification() {
        if (overlay) {
          overlay.classList.remove('show');
        }
      }

      if (dismissBtn) {
        dismissBtn.addEventListener('click', hideNotification);
      }

      // أيضاً إخفاء عند النقر خارج المربع
      if (overlay) {
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) {
            hideNotification();
          }
        });
      }

      // ⏱️ ظهور الإشعار الوهمي بعد 12 ثانية
      setTimeout(() => {
        if (overlay) {
          overlay.classList.add('show');
          console.log('🔔 [محاكاة Meta Quest 2] إشعار: "ذاكرة النظام منخفضة - 80%"');
        }
      }, 12000);

      // إخفاء شاشة التحميل
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 600);
          }
        }, 2800);
      });

    })();
  </script>

</body>
</html>
